<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Defence GIS</title>
    <link rel="stylesheet" href="../assets/css/variables.css?v=20260708">
    <link rel="stylesheet" href="../assets/css/base.css?v=20260708">
    <link rel="stylesheet" href="../assets/css/components.css?v=20260708">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--color-primary); }
        .login-card { background:var(--color-card); border:1px solid var(--color-card-border); border-radius:var(--radius-xl);
            padding:var(--space-2xl); width:100%; max-width:420px; box-shadow:var(--shadow-lg); }
        .login-logo { text-align:center; margin-bottom:var(--space-xl); }
        .login-logo .icon { font-size:3rem; }
        .login-logo h1 { font-size:var(--font-size-xl); color:var(--color-text-primary); margin:var(--space-sm) 0 0; }
        .login-logo p { color:var(--color-text-muted); font-size:var(--font-size-sm); }
        .login-error { display:none; background:rgba(239, 68, 68, 0.15); color:var(--color-danger); border:1px solid rgba(239, 68, 68, 0.3);
            border-radius:var(--radius-md); padding:var(--space-sm) var(--space-md); margin-bottom:var(--space-md); font-size:var(--font-size-sm); }
        .login-error.show { display:block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="icon">🛡️</div>
            <h1>Defence GIS</h1>
            <p>Asset Tracking &amp; Geofencing System</p>
        </div>
        <div class="login-error" id="login-error"></div>
        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button class="btn btn-primary" type="submit" id="btn-login" style="width:100%;margin-top:var(--space-md);">
                Sign In
            </button>
        </form>
        <p style="text-align:center;margin-top:var(--space-lg);color:var(--color-text-muted);font-size:var(--font-size-xs);">
            DRDO Internship Project — Secure Access Only
        </p>
    </div>
    <script>
    (function() {
        var API_BASE = '/DefenceGIS/api';

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var errBox = document.getElementById('login-error');
            errBox.classList.remove('show');

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            fetch(API_BASE + '/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.status === 'success') {
                    sessionStorage.setItem('user', JSON.stringify(data.data));
                    window.location.href = 'dashboard.html';
                } else {
                    errBox.textContent = data.message || 'Login failed';
                    errBox.classList.add('show');
                }
            })
            .catch(function(err) {
                errBox.textContent = 'Server unreachable. Check backend.';
                errBox.classList.add('show');
            })
            .finally(function() {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            });
        });
    })();
    </script>
</body>
</html>
